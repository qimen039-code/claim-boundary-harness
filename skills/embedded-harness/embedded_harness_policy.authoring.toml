[router_decision_contract.causal_attribution_contract]
purpose = "Output-side attribution review for high-risk causal, stability, definition, or generalization assertions. It prevents formation paths, local observations, or single cases from being written as mechanism properties or validated causality."
required_distinctions = [
  "mechanism_property",
  "empirical_record",
  "causal_hypothesis",
  "validated_causality",
]
default_status = "causal_hypothesis"
rule = "Use trigger groups as a first-pass filter only. The gate should fire only on high-risk assertion patterns: abstract system/framework/mechanism subject plus causal predicate plus global effect; time-range plus stability assertion; single-sample/case wording plus generalization; or origin/path wording mixed into a mechanism definition. Scoped local causal reasoning should not trigger unless it omits the needed empirical or hypothesis boundary."
exclusion = "This gate does not decide public/private visibility or release eligibility. Information-boundary decisions remain in the public/private boundary gate."

[router_decision_contract.issue_prevention_gates.exact_anchor_preservation_gate]
purpose = "Preserve exact identifiers and boundary words in public, release, citation, memory, and handoff surfaces. Do not shorten, normalize, prettify, or repair identifiers from memory."
triggers = [
