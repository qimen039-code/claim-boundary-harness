[runtime_enforcement.human_confirmation_permit]
enabled = true
schema = "cbh.r5_human_confirmation_permit.v1"
required_scope = "single_event"
required_fields = [
  "schema",
  "permit_id",
  "status",
  "scope",
  "risk_level",
  "confirmed_by",
  "expires_at_utc",
  "task_sha256",
  "tool_sha256",
]
consume_on_pass = true
consume_requires_tool_text = true
used_ledger_env_var = "CBH_R5_PERMIT_USE_LEDGER"
used_ledger_record_schema = "cbh.r5_human_confirmation_permit_use.v1"
rule = "A permit is only a short-lived single-event representation of explicit human confirmation for one exact R5/hard-tool event. When it passes for a concrete tool event, the runtime records a used-ledger entry so the same permit/task/tool combination cannot be replayed before expiry. It must not create a session-wide or project-wide bypass; all other R5 events remain blocked."
