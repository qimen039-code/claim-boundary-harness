[router_decision_contract.conversation_memory_full_lane_triggers]
decision_rule = "Create or update the active conversation memory lane when an explicit conversation-memory request is present, or when any threshold group crosses its threshold in a non-read-only task. Keep conversation_memory_threshold as a backward-compatible coarse fallback."

[router_decision_contract.conversation_memory_full_lane_triggers.threshold_groups.compaction_or_context_loss]
threshold = 1
triggers = [
