[[pattern]]
id = "policy-decision-enforcement-separation"
name = "Policy decision point / policy enforcement point separation"
used_for = [
  "separate routing decisions from execution",
  "make hard enforcement depend on host hook or wrapper integration",
]
boundary = "not a complete policy engine and not a sandbox by itself"

[[pattern]]
id = "admission-control-hooks"
name = "Admission-control style hooks"
used_for = [
  "check critical actions before persistence or execution",
  "keep ordinary tool calls low cost",
]
boundary = "critical risks only; not every ordinary tool call becomes a hard gate"

[[pattern]]
id = "append-only-ledgers"
name = "Append-only ledgers"
used_for = [
  "decision records",
  "error and solution records",
  "rejected edit records",
]
boundary = "lightweight files by default, not a database requirement"

[[pattern]]
id = "structured-provenance"
name = "Structured provenance"
used_for = [
  "source tags",
  "confidence labels",
  "derived-from chains",
  "belief status boundaries",
]
boundary = "provenance preserves evidence boundary; it does not make a claim true"

[[pattern]]
id = "meta-first-retrieval"
name = "Meta-first retrieval"
used_for = [
  "read summaries and indexes before deep payloads",
  "bound memory and static-knowledge lookup cost",
]
boundary = "retrieval discipline, not a semantic correctness guarantee"

[[pattern]]
id = "project-manuals"
name = "Project manuals and wiki-style knowledge bases"
used_for = [
  "stable module maps",
  "command maps",
  "conventions",
  "interface notes near the repository",
]
boundary = "static notes are source-prior orientation until checked against files, tests, or schemas"
